name: Actualizacion Automatica del Briefing Financiero

on:
  schedule:
    # 05:00 UTC equivale a las 07:00 AM en España (Horario de Verano CEST)
    - cron: '0 5 * * *'
  workflow_dispatch: # Esto te permite activar el script manualmente con un botón cuando quieras

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso crucial para que el script pueda guardar el index.html modificado

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ejecutar script de actualización
      run: python actualizar_briefing.py

    - name: Confirmar y subir cambios a GitHub Pages
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add index.html
        # Solo guarda si el archivo realmente cambió, para evitar errores
        git diff-index --quiet HEAD || git commit -m "Automatización: Actualización diaria del briefing a las 07:00 AM"
        git push
